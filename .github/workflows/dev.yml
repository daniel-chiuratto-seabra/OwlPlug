name: Owlplug Dev

on: 
  push:
    branches:
      - '**'
      - '!master'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Set up git user
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
    - name: GitHub Branch Name
      run: echo "${{ github.ref_name }}"
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.REPOSITORY_SECRET_TOKEN }}
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'adopt'
        java-version: 21
        cache: 'maven'
    - name: Build maven parent project
      run: mvn -B install -DskipTests
    - name: Run Test
      run: mvn test
    - name: Update version
      if: github.event.pull_request.merged && github.ref_name == 'dev'
      run: |
        # The Maven command that outputs the current project version
        MVN_VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)
        
        # Split the version number into parts. Assuming version is like `major.minor.patch`
        IFS='.' read -ra VERSION_PARTS <<< "$MVN_VERSION"

        # Increase the patch number
        let patch=${VERSION_PARTS[2]}+1
        
        # Combine back into full version string and append '-SNAPSHOT'
        NEW_VERSION="${VERSION_PARTS[0]}.${VERSION_PARTS[1]}.$patch-SNAPSHOT"
        
        # Set the Maven version
        mvn versions:set -DnewVersion=$NEW_VERSION

    - name: Commit and push
      if: github.event.pull_request.merged && github.ref_name == 'dev'
      run: |
        git add .

        TIMESTAMP=$(date "+%Y%m%d%H%M%S")
        git commit -m "chore: bump version to $NEW_VERSION [ci skip] $TIMESTAMP"

        git push origin HEAD:$GITHUB_REF