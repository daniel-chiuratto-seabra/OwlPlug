name: Owlplug Dev

on: 
  push:
    branches:
      - '**'
      - '!master'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Set up git user
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.REPOSITORY_SECRET_TOKEN }}
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'adopt'
        java-version: 21
        cache: 'maven'
    - name: Build maven parent project
      run: mvn -B install -DskipTests
    - name: Run Test
      run: mvn test
    - name: Update version
      if: github.event.pull_request.merged && github.head_ref == 'dev'
      run: |
        MVN_VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' \
          --non-recursive exec:exec)

        NEW_VERSION=${MVN_VERSION%-SNAPSHOT}-SNAPSHOT
        mvn versions:set -DnewVersion=$NEW_VERSION

    - name: Commit and push
      if: github.event.pull_request.merged && github.head_ref == 'dev'
      run: |
        git add .

        TIMESTAMP=$(date "+%Y%m%d%H%M%S")
        git commit -m "chore: bump version to $NEW_VERSION [ci skip] $TIMESTAMP"

        git push origin HEAD:$GITHUB_REF